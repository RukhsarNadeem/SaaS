<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Record System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Auth bar */
        .auth-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 10px 18px;
            margin-bottom: 24px;
            font-size: 13px;
        }
        .auth-bar .user-info { display: flex; align-items: center; gap: 10px; }
        .role-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .role-badge.teacher { background: rgba(255,215,0,0.2); color: #ffd700; }
        .role-badge.student { background: rgba(100,220,255,0.2); color: #64dcff; }
        .btn-logout {
            padding: 6px 14px;
            border: 1px solid rgba(255,100,100,0.4);
            background: rgba(255,100,100,0.1);
            color: #ff7b7b;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,100,100,0.2); }

        /* Tab system */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .tab-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: rgba(138,99,255,0.25);
            border-color: rgba(138,99,255,0.5);
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* User management */
        .user-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            animation: fadeInUp 0.4s ease;
        }
        .user-card .user-name { font-size: 14px; font-weight: 600; }
        .user-card .user-meta { font-size: 12px; opacity: 0.6; margin-top: 2px; }
        .btn-del {
            padding: 5px 12px;
            border: 1px solid rgba(255,100,100,0.4);
            background: rgba(255,100,100,0.1);
            color: #ff7b7b;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-del:hover { background: rgba(255,100,100,0.25); }
        .add-user-form input, .add-user-form select {
            padding: 10px 14px;
            margin: 6px 4px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.07);
            color: white;
            font-family: inherit;
            font-size: 13px;
        }
        .add-user-form select option { background: #1a1530; }
        #userMsg { font-size: 13px; margin-top: 10px; min-height: 20px; }
        .teacher-only { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎓 Student Record System</h1>

    <!-- Auth bar -->
    <div class="auth-bar">
        <div class="user-info">
            <span id="userName">Loading...</span>
            <span class="role-badge" id="roleBadge">—</span>
        </div>
        <a href="/logout"><button class="btn-logout">🚪 Logout</button></a>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('students', this)">📋 Students</button>
        <button class="tab-btn teacher-only" id="usersTab" onclick="switchTab('users', this)">👥 Manage Users</button>
    </div>

    <!-- Students Tab -->
    <div class="tab-content active" id="tab-students">
        <form id="studentForm">
            <input type="text" id="name" placeholder="Student Name" required>
            <input type="text" id="department" placeholder="Department" required>
            <input type="text" id="roll" placeholder="Roll Number" required>
            <button type="submit">Add Student</button>
        </form>
        <h2>📋 Student List</h2>
        <ul id="studentList"></ul>
    </div>

    <!-- Users Tab (teacher only) -->
    <div class="tab-content" id="tab-users">
        <h2>👥 Allowed Users</h2>
        <div id="userList"></div>

        <h2 style="margin-top:20px;">➕ Add New User</h2>
        <div class="add-user-form">
            <input type="text" id="newName" placeholder="Full Name">
            <input type="text" id="newUsername" placeholder="Username">
            <input type="password" id="newPassword" placeholder="Password">
            <select id="newRole">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>
            <button onclick="addUser()">Add User</button>
        </div>
        <div id="userMsg"></div>
    </div>
</div>

<script src="/static/script.js"></script>
<script>
    let currentUser = null;

    async function initPage() {
        const res = await fetch('/get_session_user');
        if (!res.ok) { window.location.href = '/login'; return; }
        currentUser = await res.json();

        document.getElementById('userName').textContent = `👤 ${currentUser.name}`;
        const badge = document.getElementById('roleBadge');
        badge.textContent = currentUser.role;
        badge.className = `role-badge ${currentUser.role}`;

        if (currentUser.role === 'teacher') {
            document.querySelectorAll('.teacher-only').forEach(el => el.style.display = 'inline-flex');
            loadUsers();
        }
    }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    async function loadUsers() {
        const res = await fetch('/get_users');
        if (!res.ok) return;
        const users = await res.json();
        const list = document.getElementById('userList');
        list.innerHTML = '';
        users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `
                <div>
                    <div class="user-name">${u.name} <span class="role-badge ${u.role}" style="font-size:10px">${u.role}</span></div>
                    <div class="user-meta">@${u.username}</div>
                </div>
                <button class="btn-del" onclick="deleteUser('${u.username}')">Remove</button>
            `;
            list.appendChild(div);
        });
    }

    async function addUser() {
        const name = document.getElementById('newName').value.trim();
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newPassword').value.trim();
        const role = document.getElementById('newRole').value;
        const msg = document.getElementById('userMsg');

        if (!name || !username || !password) { msg.style.color='#ff7b7b'; msg.textContent='All fields are required.'; return; }

        const res = await fetch('/add_user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, username, password, role })
        });
        const data = await res.json();
        msg.style.color = data.success ? '#4bd28f' : '#ff7b7b';
        msg.textContent = data.message;
        if (data.success) {
            document.getElementById('newName').value = '';
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            loadUsers();
        }
    }

    async function deleteUser(username) {
        if (!confirm(`Remove user "${username}"?`)) return;
        const res = await fetch('/delete_user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
        });
        const data = await res.json();
        if (data.success) loadUsers();
        else alert(data.message);
    }

    initPage();
</script>
</body>
</html>
